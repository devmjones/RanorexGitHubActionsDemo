name: RanorexGitHubActionsDemo # Choose a name that makes the most sense to you 
 
on: # This setup will run the workflow on Push and Pull requests to the main code branch 
  push: 
    branches: [ "main" ] 
  pull_request: 
    branches: [ "main" ] 
 
jobs: 
 
  build: 
    strategy: 
      matrix: 
        configuration: [Debug] 
 
    runs-on: self-hosted # The Runner must be self-hosted 
     
    # Configure environment variables 
    env: 
      Solution_Name: SupportSiteDemo.sln # Replace with your solution name 
      Test_Project_Path: SupportSiteDemo2\SupportSiteDemo2.csproj # Replace with the path to your test project 
       
    # Check out code from the repository 
    steps: 
    - name: Checkout 
      uses: actions/checkout@v4 # At the time of writing, v4 is the latest 
      with: 
        fetch-depth: 0 
  
    - name: Unblock files
      shell: powershell
      run: Get-ChildItem -Recurse | Unblock-File    
      
    - name: Allow PowerShell scripts
      shell: powershell
      run: |
        Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass   
 
    # Add MSBuild to the PATH: https://github.com/microsoft/setup-msbuild 
    - name: Setup MSBuild.exe 
      uses: microsoft/setup-msbuild@v2 # At the time of writing, v2 is the latest 

    - name: Clean Solution
      run: msbuild $env:Solution_Name /t:Clean /p:Configuration=$env:Configuration
      env:
        Configuration: ${{ matrix.configuration }}

    - name: Delete stale build artifacts
      shell: powershell
      run: "if (Test-Path SupportSiteDemo2\\obj) { Remove-Item -Recurse -Force SupportSiteDemo2\\obj }; if (Test-Path SupportSiteDemo2\\bin) { Remove-Item -Recurse -Force SupportSiteDemo2\\bin }"
        
    - name: Clear NuGet Cache
      shell: powershell
      run: dotnet nuget locals all --clear
 
    # This step is not required for all solutions 
    # Restore the application to populate the obj folder with RuntimeIdentifiers 
    - name: Restore the application 
      run: msbuild $env:Solution_Name /t:Restore /p:Configuration=$env:Configuration 
      env: 
        Configuration: ${{ matrix.configuration }} 
 
    # Build the solution 
    - name: Build solution 
      run: msbuild $env:Solution_Name 

    - name: Show runner execution context
      shell: powershell
      run: |
       echo "PWD:"
       pwd
       echo "FILES:"
       dir
       echo "BIN:"
       dir SupportSiteDemo2\bin\Debug  
       
    - name: Search for 12.4.2 references
      shell: powershell
      run : "Get-ChildItem -Recurse -Include *.config,*.csproj,*.rxsettings,*.xml,*.props,*.targets | Select-String -Pattern '12.4.2' | Select-Object Path, LineNumber, Line"
   
    - name: Check bin contents
      shell: powershell
      run: "if (Test-Path SupportSiteDemo2\\bin\\Debug) { Get-ChildItem -Recurse SupportSiteDemo2\\bin\\Debug } else { echo 'bin\\Debug does not exist' }"
    
    # Run the solution, replacing RxDemoApp with the name of your solution 
    - name: Run the Test Suite 
      shell: powershell
      run: ".\\SupportSiteDemo2\\bin\\Debug\\ProjectSupportSiteDemo.exe"
